<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>2026 어린이 성경 페스티벌 퀴즈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;color:#222}
.app{max-width:600px;margin:0 auto;padding:12px}
.hdr{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #e8e8e4}
.ttl{font-size:17px;font-weight:600;color:#111;margin-bottom:2px}
.sub{font-size:12px;color:#888}
.hdr-btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{padding:8px 14px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#333;cursor:pointer;font-size:13px;font-weight:500;-webkit-tap-highlight-color:transparent}
.btn:active{background:#f0f0ec;transform:scale(0.97)}
.btn-primary{background:#2d6ef7;color:#fff;border-color:#2d6ef7}
.btn-primary:active{background:#1a56d4}
.filters{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fp{padding:6px 13px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer;font-size:12px;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.fp.on{border-color:#2d6ef7;background:#e8f0fe;color:#1a56d4;font-weight:500}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.sc{background:#fff;border-radius:12px;padding:10px 6px;text-align:center;border:1px solid #e8e8e4}
.sn{font-size:20px;font-weight:700;color:#111}
.sl{font-size:10px;color:#999;margin-top:2px}
.prog-wrap{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:12px;border:1px solid #e8e8e4}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:6px}
.prog{height:8px;background:#eee;border-radius:4px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#2d6ef7,#5b8ef9);border-radius:4px;transition:width .3s}
.jump-row{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.jump-row label{font-size:12px;color:#888;white-space:nowrap}
.jump-row input{flex:1;padding:8px 12px;border-radius:10px;border:1px solid #ddd;font-size:14px;background:#fff;color:#111}
.card{background:#fff;border-radius:16px;padding:18px;margin-bottom:12px;border:1px solid #e8e8e4}
.qmeta{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.qnum{font-size:12px;color:#aaa;font-weight:500}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;background:#e8f0fe;color:#1a56d4;font-weight:500}
.qtext{font-size:15px;color:#111;line-height:1.75;word-break:keep-all}
.ans-area{margin-top:14px;padding-top:14px;border-top:1px solid #f0f0ec}
.reveal{width:100%;padding:12px;border-radius:12px;border:1.5px dashed #ddd;background:#fafaf8;color:#999;cursor:pointer;font-size:14px;-webkit-tap-highlight-color:transparent}
.reveal:active{background:#f0f0ec}
.ans-box{font-size:14px;color:#111;font-weight:500;line-height:1.75;padding:12px 14px;background:#f0f6ff;border-radius:12px;border-left:3px solid #2d6ef7;word-break:keep-all}
.ans-label{font-size:11px;color:#2d6ef7;font-weight:600;margin-bottom:6px;letter-spacing:.03em}
.nav{display:flex;justify-content:space-between;align-items:center;gap:8px}
.nav-info{font-size:13px;color:#888;font-weight:500}
.nav-btn{flex:1;max-width:100px;padding:10px;border-radius:12px;border:1px solid #ddd;background:#fff;color:#333;cursor:pointer;font-size:14px;font-weight:500;-webkit-tap-highlight-color:transparent}
.nav-btn:active{background:#f0f0ec}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="ttl">2026 어린이 성경 페스티벌</div>
    <div class="sub">마태오 복음 예상문제집 001~165번 전체</div>
    <div class="hdr-btns">
      <button class="btn" onclick="doShuffle()">섞기</button>
      <button class="btn" onclick="doReset()">초기화</button>
      <button class="btn btn-primary" onclick="revealAns()">정답 보기</button>
    </div>
  </div>

  <div class="filters" id="filterRow"></div>

  <div class="stats">
    <div class="sc"><div class="sn" id="sTotal">0</div><div class="sl">전체</div></div>
    <div class="sc"><div class="sn" id="sIdx">1</div><div class="sl">현재</div></div>
    <div class="sc"><div class="sn" id="sRevealed">0</div><div class="sl">확인</div></div>
    <div class="sc"><div class="sn" id="sPct">0%</div><div class="sl">진행률</div></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-label"><span id="progLeft">시작</span><span id="progRight">0%</span></div>
    <div class="prog"><div class="pf" id="pf" style="width:0%"></div></div>
  </div>

  <div class="jump-row">
    <label>번호 이동:</label>
    <input type="number" id="jumpInput" min="1" max="165" placeholder="001~165" inputmode="numeric">
    <button class="btn" onclick="jumpTo()">이동</button>
  </div>

  <div class="card">
    <div class="qmeta">
      <span class="qnum" id="qPos"></span>
      <span class="badge" id="qBadge"></span>
    </div>
    <div class="qtext" id="qText"></div>
    <div class="ans-area" id="ansArea"></div>
  </div>

  <div class="nav">
    <button class="nav-btn" onclick="go(-1)">← 이전</button>
    <span class="nav-info" id="navInfo"></span>
    <button class="nav-btn" onclick="go(1)">다음 →</button>
  </div>
</div>

<script>
const RAW=[
{n:1,s:"전례력·배경",q:"내년 2027년은 가, 나, 다해 중 어느 해에 해당되며 어떤 복음을 봉독하게 되나요?",a:"나해 ? 마르코 복음"},
{n:2,s:"전례력·배경",q:"\"내가 ( )이나 ( )들을 폐지하러 온 줄로 생각하지 마라. 폐지하러 온 것이 아니라 오히려 ( )하러 왔다.\"(5,17) 빈칸을 채우세요.",a:"율법, 예언서, 완성"},
{n:3,s:"1-4장",q:"예수님께서 원수에게 취하라고 하신 행동은 무엇인가요?(5,43-44)",a:"사랑하고 기도하여라"},
{n:4,s:"5-7장",q:"\"그러므로 네가 ( )을 베풀 때에는, 위선자들이 사람들에게 칭찬을 받으려고 회당과 거리에서 하듯이, 스스로 나팔을 불지 마라.\"(6,2) 빈칸은?",a:"자선"},
{n:5,s:"5-7장",q:"\"너는 기도 할 때에 ( )에 들어가 문을 닫은 다음, 숨어 계신 네 아버지께 기도하여라.\"(6,6) 빈칸은?",a:"골방"},
{n:6,s:"5-7장",q:"\"너는 ( ) 할 때에 머리에 ( )을 바르고 얼굴을 씻어라. 그리하여 네가 ( )한다는 것을 사람들에게 드러내 보이지 말고...\"(6,17-18) 빈칸을 채우세요.",a:"단식, 기름, 단식"},
{n:7,s:"전례력·배경",q:"\"본디 바리사이뿐만 아니라 모든 ( )인은 조상들의 전통을 지켜, 한 움큼의 물로 손을 씻지 않고서는 ( )을 먹지 않으며, 장터에서 돌아온 뒤에 ( )을 씻지 않고서는 ( )을 먹지 않는다.\"(마르 7,3-5) 빈칸을 채우세요.",a:"유다, 몸, 음식, 관습"},
{n:8,s:"전례력·배경",q:"마태오 복음 5~7장까지를 예수님의 산상설교라 하는데 이와 비슷한 예수님의 평지설교가 기록된 복음과 해당하는 장은 몇 장일까요?",a:"① 루카 복음 6장"},
{n:9,s:"전례력·배경",q:"마태오 복음서가 새로운 율법서라고 불리게 된 이유는 무엇일까요?",a:"① 다섯 개의 담화문이 모세오경을 떠오르게 하기 때문이다."},
{n:10,s:"전례력·배경",q:"예수님이 사천 명을 먹이신 기적은 구약성경의 어떤 기적을 떠오르게 하나요?",a:"① 만나의 기적"},
{n:11,s:"전례력·배경",q:"현재 베드로의 후계자는 누구이신가요?",a:"③ 레오 14세"},
{n:12,s:"1-4장",q:"마태오 복음서 1장은 무슨 내용으로 시작하나요?",a:"④ 예수 그리스도의 족보"},
{n:13,s:"1-4장",q:"예수님의 족보에 등장하는 여인들을 써보세요.",a:"타마르, 라합, 룻, 밧세바"},
{n:14,s:"1-4장",q:"마태오 복음에 나오는 족보에서 예수님의 조상으로 가장 중요하게 언급되고 있는 두 사람은 누구인가요?(1,1-17)",a:"② 아브라함과 다윗"},
{n:15,s:"1-4장",q:"구약성경의 이집트에서 파라오가 저질렀던 히브리 출신 사내아이들을 죽인 사건이 기록된 성경은 탈출기입니다. 해당하는 성경구절이 몇 장 몇 절인지 찾아보세요.",a:"탈출기 1장 22절"},
{n:16,s:"1-4장",q:"창세기 37장~47장을 살펴보면 요셉이 이스라엘 백성들을 구해내는 과정이 나와요. 이에 맞지 않는 내용은 무엇일까요?",a:"③ 파라오가 요셉을 마음에 들어한 이유는 그가 요리를 잘하였기 때문이다."},
{n:17,s:"1-4장",q:"주님의 천사가 요셉에게 나타나 마리아를 아내로 맞아들이라고 한 방법은 무엇인가요?(1,20)",a:"② 꿈에 나타나"},
{n:18,s:"1-4장",q:"\"보아라, 동정녀가 잉태하여 아들을 낳으리니 그 이름을 ( )이라고 하리라.\"(1,23) 빈칸은?",a:"임마누엘"},
{n:19,s:"1-4장",q:"\"임마누엘\"은 무슨 뜻을 지닌 이름인가요?",a:"③ 하느님이 우리와 함께 계시다."},
{n:20,s:"1-4장",q:"마리아가 잉태한 사실을 알고 난 후에 마리아와 약혼한 요셉이 취하려고 했던 첫 번째 행동은 무엇일까요?(1,18-25)",a:"④ 소문나지 않게 파혼하는 일"},
{n:21,s:"1-4장",q:"예수님께서는 헤로데 임금 때에 어디에서 태어나셨나요?(2,1)",a:"② 베들레헴"},
{n:22,s:"1-4장",q:"동방박사들이 예수님께 경배하기 위해 가져온 예물이 아닌 것은 무엇일까요?(2,7-12)",a:"④ 성경"},
{n:23,s:"1-4장",q:"예수님께서 태어났을 때 유다 왕국을 다스리던 왕은 누구일까요?(2,1-12)",a:"③ 헤로데"},
{n:24,s:"1-4장",q:"요셉과 마리아가 아기 예수님을 데리고 피난 간 곳은 어디일까요?(2,13-15)",a:"④ 이집트"},
{n:25,s:"1-4장",q:"탈출기 4장 22절에 하느님께서 이스라엘을 무엇이라고 표현하셨나요? \"이스라엘은 나의 ( )이다.\"",a:"맏아들"},
{n:26,s:"1-4장",q:"세례자 요한이 나타나 선포한 장소는 어디인가요?(3,1)",a:"② 유다 광야"},
{n:27,s:"1-4장",q:"유다 광야에서 세례자 요한이 선포한 것은 무엇인가요?",a:"\"회개하여라. 하늘 나라가 가까이 왔다.\"(마태오 3,2)"},
{n:28,s:"1-4장",q:"세례자 요한이 자기 뒤에 오실 분은 무엇으로 세례를 준다고 했나요?(3,11)",a:"① 성령과 불"},
{n:29,s:"1-4장",q:"예수님께서 요한에게 세례를 받으신 곳은 어디였나요?(3,13)",a:"④ 요르단 강"},
{n:30,s:"1-4장",q:"예수님께서 세례를 받으실 때 하늘에서 나타난 현상이 아닌 것은 무엇일까요?(3,13-17)",a:"④ \"지금은 내가 하자는 대로 하여라\"라는 소리를 하셨다."},
{n:31,s:"1-4장",q:"예수님께서 공생활에 앞서 성령의 인도로 향하신 곳은 어디였나요?(4,1)",a:"② 광야"},
{n:32,s:"1-4장",q:"예수께서 마귀에게 유혹을 당하실 때 다음 중 어느 성경을 인용하시면서 유혹을 이기셨나요?(4,1-11)",a:"③ 신명기"},
{n:33,s:"1-4장",q:"예수님께서 받으신 세 가지 유혹에 해당하지 않는 것은 무엇일까요?(4,1-11)",a:"④ 하느님을 섬겨라."},
{n:34,s:"1-4장",q:"예수님께서 광야에서 단식했던 기간은 며칠일까요?(4,1-11)",a:"③ 40일"},
{n:35,s:"1-4장",q:"신자가 단식과 금육을 하는 이유는 무엇일까요?",a:"③ 절약해서 모은 것을 이웃에게 나누어주기 위해서이다."},
{n:36,s:"1-4장",q:"사순절에 대한 설명이 맞지 않는 것은 무엇일까요?",a:"③ 사순절 기간의 미사에는 알렐루야를 하지 않고 대영광송은 유지한다."},
{n:37,s:"1-4장",q:"예수님이 공생활을 시작하며 선포하신 말씀은 무엇이었나요?",a:"② \"회개하여라. 하늘 나라가 가까이 왔다.\"(마태오 4,17)"},
{n:38,s:"1-4장",q:"고해성사의 과정 중에서 통회의 의미와 한자를 써보세요.",a:"痛悔 ? 알아낸 잘못을 마음으로 아파하고 뉘우침"},
{n:39,s:"1-4장",q:"예수님이 처음으로 부르신 제자들의 직업은 무엇이었나요?(4,18)",a:"③ 어부"},
{n:40,s:"1-4장",q:"예수님께서 갈릴래아 호숫가에서 제일 먼저 부르신 두 형제는 누구인가요?(4,18)",a:"② 베드로와 안드레아"},
{n:41,s:"1-4장",q:"제베대오의 아들인 두 형제는 누구인가요?(4,21)",a:"② 야고보와 요한"},
{n:42,s:"1-4장",q:"야고보와 요한은 예수님의 부르심을 받고 어떻게 했나요?(4,22)",a:"③ 곧바로 배와 아버지를 버려두고 그분을 따랐다."},
{n:43,s:"5-7장",q:"예수님께서 군중을 보시고 어디로 오르셨나요?(5,1)",a:"② 산"},
{n:44,s:"5-7장",q:"\"마음이 가난한 사람\"이란 무슨 뜻인가요?",a:"① 욕심으로 채우는 행복이 아니라 빈 마음으로 살아가는 사람"},
{n:45,s:"5-7장",q:"예수님께서는 소금이 제맛을 잃으면 어떻게 된다고 하셨나요?",a:"③ 아무 쓸모가 없다"},
{n:46,s:"5-7장",q:"등불은 켜서 어디에 놓는 것일까요?(5,15)",a:"③ 등경 위"},
{n:47,s:"5-7장",q:"예수님이 오시는 것과 율법의 관계는 어떻게 되나요?(5,17-20)",a:"③ 예수님의 오심은 율법을 완성하기 위함이다."},
{n:48,s:"5-7장",q:"예수님께서는 예물을 바치기 전에 먼저 무엇을 하라고 하셨나요?(5,23-24)",a:"③ 화해"},
{n:49,s:"5-7장",q:"예수님께서 원수에게 취하라고 하신 행동은 무엇인가요?(5,43-44)",a:"④ 사랑하고 기도하라"},
{n:50,s:"5-7장",q:"마태오 복음 5장 46절을 옮겨 적으세요.",a:"사실 너희가 자기를 사랑하는 이들만 사랑한다면 무슨 상을 받겠느냐? 그것은 세리들도 하지 않느냐?"},
{n:51,s:"5-7장",q:"예수님께서 제자들에게 요구하신 궁극적인 삶의 기준은 무엇인가요?(5,48)",a:"③ 하늘의 아버지처럼 완전해지는 것"},
{n:52,s:"5-7장",q:"예수님께서 몸소 제자들에게 가르쳐 주신 기도는 무엇인가요?",a:"③ 주님의 기도"},
{n:53,s:"5-7장",q:"예수님께서는 기도할 때 빈말을 되풀이하지 말라고 하신 이유로 무엇을 말씀하셨나요?",a:"③ 하느님께서 이미 필요한 것을 알고 계시기 때문에"},
{n:54,s:"5-7장",q:"주님의 기도에 대한 설명에서 빈칸을 채워 보세요. \"주님의 기도에서는, 하느님께 ( )이 있어요. 그분께서 먼저 행동하시며, 모든 것은 그분에게서 ( )되기에 우리는 주님의 기도를 통해 그분께 ( )을 내어드리는 것이 늘 ( )임을 잊지 말아야 해요.\"",a:"주도권, 시작, 주도권, 우선"},
{n:55,s:"5-7장",q:"예수님께서 말씀하신 재물을 하늘에 쌓아 두어야 하는 이유가 아닌 것은 무엇일까요?(6,19-21)",a:"④ 하늘나라에는 재물이 많이 필요하기 때문에"},
{n:56,s:"5-7장",q:"\"너희는 먼저 ( )와/과 그분의 ( )을/를 찾아라. 그러면 이 모든 것도 곁들여 받게 될 것이다.\"(6,33) 빈칸을 순서대로 채우세요.",a:"하느님 나라, 의로움"},
{n:57,s:"5-7장",q:"예수님께서 '아무도 두 주인을 섬길 수 없다'(6,24)고 하시며 언급하신 두 가지는 무엇일까요?",a:"② 하느님과 재물"},
{n:58,s:"5-7장",q:"하느님과 재물에 대한 설명 빈칸을 채우세요. 1) 우리에게 필요한 것은 ( ) 아니라 모든 것을 아시고 준비해 주시는 하느님에 대한 ( )이에요. 2) 내일 필요한 물질을 ( ) 확보해 두고자 하는 시도가 바로 재물에 대한 ( )으로 이어진다는 것이에요.",a:"1) 내일에 대한 걱정, 굳은 믿음 / 2) 오늘, 집착"},
{n:59,s:"5-7장",q:"예수님께서 '심판을 받지 않으려면'(7,1) 어떻게 하라고 하셨나요?",a:"① 심판하지 마라"},
{n:60,s:"5-7장",q:"\"위선자야, 먼저 네 눈에서 ( )을 빼내어라. 그래야 네가 뚜렷이 보이고 형제의 눈에서 티를 빼낼 수 있을 것이다.\"(7,5) 빈칸은?",a:"들보"},
{n:61,s:"5-7장",q:"\"( ), 너희에게 주실 것이다. ( ), 너희가 얻을 것이다. ( ), 너희에게 열릴 것이다.\"(7,7) 빈칸을 채우세요.",a:"청하여라, 찾아라, 문을 두드려라"},
{n:62,s:"5-7장",q:"\"거룩한 것을 ( )에게 주지 말고 진주를 ( )에게 던지지 마라.\"(7,6) 빈칸은?",a:"③ 개, 돼지"},
{n:63,s:"5-7장",q:"황금률이라고 불리는 구절(7,12)을 써보세요.",a:"그러므로 남이 너희에게 해 주기를 바라는 그대로 너희도 남에게 해 주어라. 이것이 율법과 예언서의 정신이다."},
{n:64,s:"5-7장",q:"빈칸을 채우세요. \"너희는 ( )으로 들어가라.\"(7,13) / \"너희는 ( )들을 조심하여라...\"(7,15) / 말을 듣고 실행하는 이는 집을 ( ) 위에 지은 슬기로운 사람 / 말을 듣고 실행하지 않는 자는 집을 ( ) 위에 지은 어리석은 사람(7,24-26)",a:"좁은 문 / 거짓 예언자 / 반석 / 모래"},
{n:65,s:"8-10장",q:"마태오 복음에서 맨 처음 소개되는 예수님의 기적은 무엇인가요?(8,1-4)",a:"④ 나병환자를 깨끗하게 낫게 하심"},
{n:66,s:"8-10장",q:"예수님께서 나병 환자를 고치실 때(8,1-3) 하신 행동은 무엇인가요?",a:"② 손을 내밀어 그에게 대셨다"},
{n:67,s:"8-10장",q:"백인대장이 예수님께 청한 것(8,5-6)은 무엇일까요?",a:"② 종의 병을 고쳐달라"},
{n:68,s:"8-10장",q:"자기 종을 고쳐달라고 부탁했던 백인대장에게 예수님께서 하신 말씀은 무엇일까요?(8,5-13)",a:"③ 정말 어떤 이스라엘 사람에게서도 이런 믿음을 본 일이 없다."},
{n:69,s:"8-10장",q:"마태오 복음 속에서 베드로가 결혼했음을 추측할 수 있는 사건은 무엇인가요?(8,14-17)",a:"② 예수님께서 베드로의 장모를 고쳐 주셨다."},
{n:70,s:"8-10장",q:"\"여우들도 ( )이/가 있고 하늘의 새들도 ( )이/가 있지만, 사람의 아들은 머리를 ( )조차 없다.\"(8,20) 빈칸을 채우세요.",a:"굴, 보금자리, 기댈 곳"},
{n:71,s:"8-10장",q:"예수님이 제자들과 배에 타셨을 때(8,23-24) 무슨 일이 일어났나요?",a:"② 큰 풍풍이 일었다"},
{n:72,s:"8-10장",q:"\"왜 ( )을 내느냐? 이 ( )이 약한 자들아!\"(8,26) 빈칸은?",a:"겁, 믿음"},
{n:73,s:"8-10장",q:"마귀들이 예수님께, \"저희를 쫓아내시려거든 저 ( ) 떼 속으로나 들여보내 주십시오.\"하고 청하였다.(8,31) 빈칸은?",a:"돼지"},
{n:74,s:"8-10장",q:"가다라인 지방 사람들은 마귀 사건 후(8,34) 예수님께 어떻게 했을까요?",a:"③ 예수님께 떠나 달라고 청했다"},
{n:75,s:"8-10장",q:"마태오 복음 9장에서 예수님이 병을 고치기 전에 먼저 용서한 사람은 누구일까요?(9,2-8)",a:"① 침상에 누운 중풍병자"},
{n:76,s:"8-10장",q:"예수님께서 세리와 죄인들과 식사하신 행동이 당시 사람들에게 충격이 된 이유는 무엇일까요?(9,10-11)",a:"③ 죄인과 어울리면 부정해진다고 여겼기 때문에"},
{n:77,s:"8-10장",q:"예수님께서 바리사이들에게 '나는 의인이 아니라' 누구를 부르러 왔다고 하셨나요?(9,13)",a:"② 죄인"},
{n:78,s:"8-10장",q:"\"아무도 새 천 조각을 ( )에 대고 꿰매지 않는다... 또한 새 포도주를 ( )에 담지 않는다... ( ) 그래야 둘 다 보존된다.\"(9,16-17) 빈칸은?",a:"헌옷, 헌 가죽 부대, 새 포도주는 새 부대에 담아야 한다."},
{n:79,s:"8-10장",q:"예수님이 회당장의 집에 이르셨을 때 딸은 어떤 상태였나요?(9,24)",a:"③ 이미 죽어 있었다."},
{n:80,s:"8-10장",q:"예수님의 옷자락을 만져 혈루증이 낫게 된 여인이 병을 앓았던 햇수는 얼마일까요?(9,18-26)",a:"① 열두 해"},
{n:81,s:"8-10장",q:"예수님께서 눈먼 이들의 눈을 손을 대시며 뭐라고 하셨나요?(9,29)",a:"① 너희가 믿는 대로 되어라"},
{n:82,s:"8-10장",q:"예수님께서는 제자들을 파견하시면서 아무것도 지니지 말라는 이유는 무엇일까요?(10,5-15)",a:"③ 주님만을 믿고 의지해야 하기 때문에"},
{n:83,s:"8-10장",q:"예수님께서 제자들에게 전하라고 하신 메시지는 무엇이었나요?(10,7)",a:"② 하늘 나라가 가까이 왔다."},
{n:84,s:"8-10장",q:"\"누구든지 너희를 받아들이지 않고 너희 말도 듣지 않거든, 그 집이나 그 고을을 떠날 때에 너희 발의 ( )를 털어 버려라.\"(10,14) 빈칸은?",a:"먼지"},
{n:85,s:"8-10장",q:"예수님께서 박해에 맞서 '끝까지 견디는 이는' 무엇을 얻는다고 하셨나요?(10,22)",a:"② 구원"},
{n:86,s:"11-14장",q:"마태오 복음 11장에서 예수님께 저주받은 도시가 아닌 곳은 어디일까요?(11,20-24)",a:"② 예루살렘"},
{n:87,s:"11-14장",q:"마태오 복음 11장 28절에서 30절의 말씀을 찾아 적어보세요.",a:"고생하며 무거운 짐을 진 너희는 모두 나에게 오너라. 내가 너희에게 안식을 주겠다."},
{n:88,s:"11-14장",q:"예수님께서 \"내가 너희에게 말한다. 성전보다 더 큰 이가 여기에 있다.\"고 말씀하신 때는 언제인가요?(12,1-8)",a:"① 안식일에 제자들이 밀 이삭을 잘라 먹었을 때"},
{n:89,s:"11-14장",q:"\"그는 올바름을 승리로 이끌 때까지 부러진 ( )를 꺾지 않고 연기 나는 ( )를 끄지 않으리니...\"(12,20-21) 빈칸은?",a:"갈대, 심지"},
{n:90,s:"11-14장",q:"\"악하고 절개 없는 세대가 ( )을 요구하는구나!\"(12,39) 빈칸은?",a:"② 표징"},
{n:91,s:"11-14장",q:"예수님께서 군중들에게 말씀하실 때 자주 쓰신 방법은 무엇일까요?(13,3)",a:"② 비유"},
{n:92,s:"11-14장",q:"가라지의 비유 이야기에서 밭의 주인의 모습을 옳게 표현한 것은 무엇일까요?(13,24-30)",a:"③ 추수 때까지 밀과 가라지가 함께 자라게 두었다."},
{n:93,s:"11-14장",q:"'그물의 비유' 이야기에서 천사들이 의인들 가운데에서 악한 자들을 가려내어 심판한다고 합니다. 그 시기는 언제일까요?(13,47-50)",a:"세상 종말"},
{n:94,s:"11-14장",q:"\"좋은 것들은 그릇에 담고 나쁜 것들은 밖으로 던져 버렸다. ( )에도 그렇게 될 것이다.\"(13,48-49) 빈칸은?",a:"세상 종말"},
{n:95,s:"11-14장",q:"예수님께서 빵 다섯 개와 물고기 두 마리로 오천 명을 먹이신 뒤 남은 조각을 모았더니 몇 광주리를 채웠나요?(14,15-21)",a:"④ 열두 광주리"},
{n:96,s:"11-14장",q:"14장 27절의 예수님 말씀을 적어보세요.",a:"용기를 내어라. 나다. 두려워하지 마라."},
{n:97,s:"11-14장",q:"예수님을 따라 물 위를 걷다가 빠질 뻔한 제자는 누구일까요?(14,28-31)",a:"① 베드로"},
{n:98,s:"15-18장",q:"마태오 복음 15장에서 사람의 마음에서 나와 사람을 더럽히는 여섯 가지 악한 생각들을 적어보세요.(15,10-20)",a:"살인, 간음, 불륜, 도둑질, 거짓증언, 중상"},
{n:99,s:"15-18장",q:"예수님께서 빵 일곱 개와 물고기 조금으로 남자만도 사천 명을 먹이신 뒤 남은 조각은 몇 바구니였나요?(15,32-38)",a:"② 일곱 바구니"},
{n:100,s:"15-18장",q:"\"너는 베드로이다. 내가 이 ( ) 위에 내 교회를 세울 터인즉, 저승의 세력도 그것을 이기지 못할 것이다.\"(16,18) 빈칸은?",a:"반석"},
{n:101,s:"15-18장",q:"\"또 나는 너에게 하늘 나라의 열쇠를 주겠다...\"는 말씀은 예수님께서 누구에게 하신 말씀인가요?(16,13-20)",a:"① 베드로"},
{n:102,s:"15-18장",q:"\"너는 ( )은 생각하지 않고, ( )만 생각하는구나!\"(16,23) 빈칸을 채우세요.",a:"하느님의 일, 사람의 일"},
{n:103,s:"15-18장",q:"예수님의 거룩한 변모 사건 때 예수님과 함께 나타난 두 사람은 누구였나요?(17,1-3)",a:"② 모세와 엘리야"},
{n:104,s:"15-18장",q:"변모 사건에 놀란 베드로는 그곳에 초막을 몇 개 지으면 좋겠다고 하였나요?(17,4)",a:"② 세 개"},
{n:105,s:"15-18장",q:"예수님께서 성전세와 관련하여 말씀하시면서, 낚시를 던져 잡은 물고기 입에서 발견한 것은 무엇일까요?(17,24-27)",a:"③ 스타테르 한 닢"},
{n:106,s:"15-18장",q:"학자들은 마태오 복음 18장을 무엇이라고 부르나요?",a:"교회 공동체 규범"},
{n:107,s:"15-18장",q:"하늘 나라에서는 누가 가장 큰 사람인가요?(18,4)",a:"④ 어린이처럼 자신을 낮추는 사람"},
{n:108,s:"15-18장",q:"예수님에게 불행한 사람이란 누구를 말하는 것일까요?(18,6-9)",a:"② 남을 죄짓게 하는 사람"},
{n:109,s:"15-18장",q:"디찾은 양의 비유에서 양 백마리 가진 사람이 한 마리의 양을 잃어버렸을 때 한 행동은 무엇일까요?",a:"② 나머지 양을 남겨두고 한 마리를 찾아나선다."},
{n:110,s:"15-18장",q:"예수님께서는 죄를 지은 형제를 어떻게 대하라고 말씀하시나요?(18,15-17)",a:"② 그를 타일러라."},
{n:111,s:"15-18장",q:"베드로가 예수님께 '형제가 저에게 죄를 지으면 몇 번이나 용서해 주어야 합니까?' 하고 물었을 때, 베드로가 제시한 횟수는 몇 번이었나요?(18,21)",a:"③ 일곱 번"},
{n:112,s:"15-18장",q:"예수님께서 베드로에게 '일곱 번이 아니라' 몇 번까지 용서하라고 하셨나요?(18,22)",a:"② 일흔일곱 번"},
{n:113,s:"15-18장",q:"매정한 종의 비유에서 임금이 종에게 탕감해 준 빚은 얼마였나요?(18,24)",a:"③ 만 탈렌트"},
{n:114,s:"15-18장",q:"매정한 종이 자기 동료에게 받아야 할 빚은 얼마였나요?(18,28)",a:"① 백 데나리온"},
{n:115,s:"19-22장",q:"예수님께서 이혼을 하지 말라고 엄격히 가르치신 이유는 무엇일까요?(19,1-9)",a:"① 하느님께서 맺어주신 것이기 때문에"},
{n:116,s:"19-22장",q:"신부님과 수녀님은 왜 결혼을 하지 않을까요?",a:"③ 하늘 나라를 위해 전적으로 헌신하기 위해서"},
{n:117,s:"19-22장",q:"예수님께서는 하늘 나라는 누구와 같은 사람의 것이라고 이야기하시나요?(19,14)",a:"어린이들"},

{n:165,s:"27-28장",q:"제자들을 홀로 버려두지 않으시고 교회 공동체와 함께 계시면서 돕겠다고 약속하신다는 말씀을 적어보세요.",a:"보라, 내가 세상 끝 날까지 언제나 너희와 함께 있겠다."}

const SECTIONS=["전체","전례력·배경","1-4장","5-7장","8-10장","11-14장","15-18장","19-22장","23-26장","27-28장"];
let curSec="전체",qs=[...RAW],idx=0,revealed=new Set(),revCount=0;
function getFiltered(){return curSec==="전체"?RAW:RAW.filter(q=>q.s===curSec);}
function buildFilters(){
  document.getElementById('filterRow').innerHTML=SECTIONS.map(s=>
    `<button class="fp ${s===curSec?'on':''}" onclick="setSec('${s}')">${s}</button>`).join('');
}
function setSec(s){curSec=s;qs=[...getFiltered()];idx=0;revealed=new Set();revCount=0;buildFilters();render();}
function doShuffle(){for(let i=qs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[qs[i],qs[j]]=[qs[j],qs[i]];}idx=0;revealed=new Set();revCount=0;render();}
function doReset(){qs=[...getFiltered()];idx=0;revealed=new Set();revCount=0;render();}
function jumpTo(){
  const v=parseInt(document.getElementById('jumpInput').value);
  if(isNaN(v))return;
  const fi=qs.findIndex(q=>q.n===v);
  if(fi>=0){idx=fi;render();}else{alert('현재 필터에서 '+v+'번 문제를 찾을 수 없습니다.');}
}
function render(){
  const q=qs[idx];
  document.getElementById('qPos').textContent=`문제 ${idx+1}/${qs.length} (원본 ${String(q.n).padStart(3,'0')}번)`;
  document.getElementById('qBadge').textContent=q.s;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('sTotal').textContent=qs.length;
  document.getElementById('sIdx').textContent=idx+1;
  document.getElementById('sRevealed').textContent=revCount;
  const pct=qs.length>1?Math.round((idx/(qs.length-1))*100):100;
  document.getElementById('sPct').textContent=pct+'%';
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('progLeft').textContent=`${String(q.n).padStart(3,'0')}번`;
  document.getElementById('progRight').textContent=pct+'%';
  document.getElementById('navInfo').textContent=`${idx+1} / ${qs.length}`;
  const aa=document.getElementById('ansArea');
  if(revealed.has(idx)){
    aa.innerHTML=`<div class="ans-label">정답</div><div class="ans-box">${q.a.replace(/\n/g,'<br>')}</div>`;
  } else {
    aa.innerHTML=`<button class="reveal" onclick="revealAns()">탭하면 정답이 보입니다</button>`;
  }
}
function revealAns(){if(!revealed.has(idx)){revealed.add(idx);revCount++;}render();}
function go(d){if(d<0&&idx>0){idx--;render();}else if(d>0&&idx<qs.length-1){idx++;render();}}
buildFilters();render();
</script>
